<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="인스타그램 매거진 이미지 카드 제작">
  <link rel="manifest" href="./manifest.json">
  <title>카드 메이커</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <header>
    <h1>카드 메이커</h1>
    <span class="badge">4:5 · 2160×2700</span>
  </header>

  <!-- 캔버스 미리보기 -->
  <div id="canvas-wrap">
    <canvas id="preview"></canvas>
    <div id="canvas-placeholder">
      <!-- 이미지 아이콘 -->
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>이미지를 업로드해주세요</p>
    </div>
  </div>

  <!-- 컨트롤 패널 -->
  <div id="panel">

    <!-- 이미지 업로드 -->
    <div class="section">
      <p class="section-title">이미지</p>
      <button id="upload-btn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        갤러리에서 불러오기
      </button>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <!-- 텍스트 -->
    <div class="section">
      <p class="section-title">텍스트</p>
      <textarea
        id="text-input"
        rows="2"
        placeholder="첫 번째 줄&#10;두 번째 줄"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      ></textarea>
    </div>

    <!-- 그라디언트 -->
    <div class="section">
      <p class="section-title">그라디언트 오버레이</p>

      <!-- 강도 -->
      <div class="ctrl-row">
        <span class="ctrl-label">강도</span>
        <input type="range" id="grad-alpha" min="0" max="1" step="0.01" value="0.64">
        <span class="ctrl-val" id="grad-alpha-val">0.64</span>
      </div>

      <!-- 색깔 -->
      <div class="ctrl-row color-row">
        <span class="ctrl-label">색깔</span>
        <div class="color-wrap">
          <input type="color" id="grad-color" value="#000000">
        </div>
        <span style="font-size:12px;color:var(--text-muted);margin-left:4px;">오버레이 색상</span>
      </div>

      <!-- 시작/끝 위치 -->
      <div class="ctrl-row">
        <span class="ctrl-label">시작</span>
        <input type="range" id="grad-start" min="0" max="99" step="1" value="32">
        <span class="ctrl-val" id="grad-start-val">32%</span>
      </div>

      <div class="ctrl-row">
        <span class="ctrl-label">끝</span>
        <input type="range" id="grad-end" min="1" max="100" step="1" value="100">
        <span class="ctrl-val" id="grad-end-val">100%</span>
      </div>
    </div>

    <!-- 액션 버튼 -->
    <div class="section" style="padding: 12px;">
      <button id="preview-btn" class="btn btn-secondary" type="button" style="width:100%;margin-bottom:10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        미리보기
      </button>
      <div class="btn-group">
        <button id="share-btn" class="btn btn-primary" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/>
            <circle cx="6" cy="12" r="3"/>
            <circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          인스타그램에 공유
        </button>
        <button id="download-btn" class="btn btn-secondary" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          PNG
        </button>
      </div>
    </div>

  </div><!-- /panel -->

  <!-- 미리보기 모달 -->
  <div id="preview-modal" class="modal-overlay" style="display:none;">
    <div class="modal-inner">
      <button id="modal-close" class="modal-close" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <canvas id="modal-canvas"></canvas>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
